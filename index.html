<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RIR Trainer</title>
<style>
  :root {
    --bg: #0d0d0d;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: #2e2e2e;
    --accent: #f5a623;
    --accent2: #e8950f;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --green: #30d158;
    --red: #ff453a;
    --blue: #0a84ff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  .screen { display: none; min-height: 100vh; padding-bottom: 40px; }
  .screen.active { display: block; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; align-items: center; gap: 12px; }
  .btn-back {
    background: none; border: none; color: var(--accent);
    font-size: 17px; cursor: pointer; padding: 4px 0;
    display: flex; align-items: center; gap: 4px;
  }
  .btn-back svg { width: 10px; height: 16px; }
  .header-title { font-size: 17px; font-weight: 600; flex: 1; }
  .header-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

  #screen-sesiones .page-title {
    padding: 32px 20px 8px;
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  }
  #screen-sesiones .page-sub {
    padding: 0 20px 24px;
    font-size: 15px; color: var(--text2);
  }

  .sesion-card {
    margin: 0 16px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: space-between;
    -webkit-user-select: none;
  }
  .sesion-card:active { background: var(--bg3); transform: scale(0.98); }
  .sesion-card.completada { opacity: 0.5; }
  .sesion-info { flex: 1; }
  .sesion-nombre { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .sesion-meta { font-size: 13px; color: var(--text2); }
  .sesion-estado {
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
  }
  .sesion-estado.pendiente { background: rgba(255,255,255,0.08); color: var(--text2); }
  .sesion-estado.completada { background: rgba(48,209,88,0.15); color: var(--green); }
  .chevron { color: var(--text3); font-size: 18px; margin-left: 12px; }

  .ejercicio-card {
    margin: 0 16px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ejercicio-card:active { background: var(--bg3); }
  .ejercicio-card.completado { opacity: 0.5; }
  .ejercicio-header {
    padding: 16px 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .ejercicio-nombre { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .ejercicio-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag {
    font-size: 12px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px;
    background: var(--bg3); color: var(--text2);
  }
  .tag.accent { background: rgba(245,166,35,0.15); color: var(--accent); }
  .ejercicio-footer {
    padding: 10px 18px;
    background: var(--bg3);
    border-top: 1px solid var(--border);
    display: flex; gap: 16px; align-items: center;
  }
  .ejercicio-footer-item { font-size: 12px; color: var(--text2); }
  .ejercicio-footer-item span { color: var(--text); font-weight: 600; }
  .estado-badge {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .estado-badge.completado { background: var(--green); border-color: var(--green); }

  .btn-video {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(10,132,255,0.15);
    border: 1px solid rgba(10,132,255,0.3);
    color: var(--blue);
    font-size: 12px; font-weight: 600;
    padding: 5px 11px; border-radius: 20px;
    cursor: pointer; text-decoration: none;
    transition: background 0.15s; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-video:active { background: rgba(10,132,255,0.28); }

  .evolucion-bar {
    font-size: 11px; font-weight: 600;
    padding: 4px 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ejercicio-detail-header {
    padding: 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .ejercicio-detail-nombre {
    font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 12px;
  }
  .detail-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .detail-item {
    background: var(--bg3); border-radius: var(--radius-sm);
    padding: 10px 8px; text-align: center;
  }
  .detail-item-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .detail-item-value { font-size: 18px; font-weight: 700; }
  .detail-item-value.accent { color: var(--accent); }

  .peso-ref {
    margin: 0 16px 12px;
    padding: 12px 16px;
    background: rgba(10,132,255,0.1);
    border: 1px solid rgba(10,132,255,0.25);
    border-radius: var(--radius-sm);
    display: flex; justify-content: space-between; align-items: center;
  }
  .peso-ref-label { font-size: 13px; color: var(--blue); }
  .peso-ref-value { font-size: 15px; font-weight: 700; color: var(--text); }

  .peso-rec {
    margin: 0 16px 16px;
    padding: 12px 16px;
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.25);
    border-radius: var(--radius-sm);
    display: flex; justify-content: space-between; align-items: center;
  }
  .peso-rec-label { font-size: 13px; color: var(--accent); }
  .peso-rec-value { font-size: 15px; font-weight: 700; color: var(--accent); }

  .series-container { padding: 0 16px; }
  .series-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text2); margin-bottom: 12px;
  }
  .series-table {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
  }
  .series-col-headers {
    display: grid; grid-template-columns: 44px 1fr 1fr 1fr 44px;
    padding: 10px 14px;
    background: var(--bg3); border-bottom: 1px solid var(--border);
  }
  .series-col-header {
    font-size: 11px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px; text-align: center;
  }
  .series-col-header:first-child { text-align: left; }
  .serie-row {
    display: grid; grid-template-columns: 44px 1fr 1fr 1fr 44px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    align-items: center; gap: 6px;
  }
  .serie-row:last-child { border-bottom: none; }
  .serie-row.completada-row { background: rgba(48,209,88,0.05); }
  .serie-num { font-size: 14px; font-weight: 700; color: var(--text2); }
  .serie-input {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-size: 16px; font-weight: 600; text-align: center;
    padding: 8px 4px; width: 100%;
    -webkit-appearance: none; outline: none;
    transition: border-color 0.15s;
  }
  .serie-input:focus { border-color: var(--accent); }
  .serie-input.completada-input {
    background: transparent; border-color: transparent; color: var(--text2);
  }
  .serie-check { display: flex; align-items: center; justify-content: center; }
  .btn-check {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid var(--border); background: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-check.done { background: var(--green); border-color: var(--green); }
  .btn-check svg { width: 13px; height: 13px; }

  .notas-container { padding: 0 16px 16px; }
  .section-label {
    padding: 0 0 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
    color: var(--text3); text-transform: uppercase;
  }
  .notas-input {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-size: 15px; padding: 14px 16px; resize: none;
    font-family: inherit; outline: none; transition: border-color 0.15s;
  }
  .notas-input:focus { border-color: var(--accent); }
  .notas-input::placeholder { color: var(--text3); }

  .btn-primary {
    display: block; width: calc(100% - 32px); margin: 0 16px 12px;
    padding: 16px; background: var(--accent); color: #000;
    font-size: 16px; font-weight: 700; border: none; border-radius: var(--radius);
    cursor: pointer; transition: background 0.15s, transform 0.1s; letter-spacing: 0.3px;
  }
  .btn-primary:active { background: var(--accent2); transform: scale(0.98); }
  .btn-primary:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; transform: none; }

  .btn-secondary {
    display: block; width: calc(100% - 32px); margin: 0 16px 24px;
    padding: 14px; background: var(--bg2); color: var(--text2);
    font-size: 15px; font-weight: 600; border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer; transition: background 0.15s;
  }
  .btn-secondary:active { background: var(--bg3); }

  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 16px;
    color: var(--text2); font-size: 15px;
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    margin: 20px 16px; padding: 16px;
    background: rgba(255,69,58,0.1); border: 1px solid rgba(255,69,58,0.3);
    border-radius: var(--radius); color: var(--red); font-size: 14px; line-height: 1.5;
  }
  .empty { text-align: center; padding: 48px 24px; color: var(--text2); font-size: 15px; line-height: 1.6; }

  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg3); color: var(--text);
    padding: 12px 20px; border-radius: 24px;
    font-size: 14px; font-weight: 600; border: 1px solid var(--border);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: rgba(48,209,88,0.2); border-color: rgba(48,209,88,0.4); color: var(--green); }
  .toast.error { background: rgba(255,69,58,0.2); border-color: rgba(255,69,58,0.4); color: var(--red); }

  .nota-entrenador {
    margin: 0 16px 16px; padding: 12px 14px;
    background: var(--bg2); border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13px; color: var(--text2); line-height: 1.5;
  }

  /* Temporizador */
  .timer-bar {
    margin: 0 16px 16px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: none;
  }
  .timer-bar.visible { display: flex; align-items: center; gap: 12px; }
  .timer-label { font-size: 13px; color: var(--text2); flex: 1; }
  .timer-count { font-size: 22px; font-weight: 700; color: var(--accent); min-width: 48px; text-align: right; }
  .timer-progress {
    height: 3px; background: var(--border); border-radius: 2px;
    margin-top: 10px; overflow: hidden;
  }
  .timer-progress-bar {
    height: 100%; background: var(--accent);
    transition: width 1s linear; border-radius: 2px;
  }


  /* ── CALENDARIO ── */
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 16px;
  }
  .cal-mes-titulo { font-size: 17px; font-weight: 700; }
  .cal-nav-btn {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px;
  }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px; padding: 0 12px 16px;
    min-height: 280px;
  }
  .cal-dia-header {
    text-align: center; font-size: 11px; font-weight: 600;
    color: var(--text3); padding: 4px 0 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .cal-dia {
    border-radius: 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; position: relative;
    transition: background 0.15s; padding: 4px 2px;
    min-height: 48px; min-width: 0;
  }
  .cal-dia:active { opacity: 0.7; }
  .cal-dia.vacio { cursor: default; }
  .cal-dia.hoy { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.3); }
  .cal-dia-num {
    font-size: 13px; font-weight: 600; color: var(--text);
    line-height: 1; margin-bottom: 3px;
  }
  .cal-dia.otro-mes .cal-dia-num { color: var(--text3); }
  .cal-dia.hoy .cal-dia-num { color: var(--accent); }

  .cal-badges { display: flex; flex-direction: column; gap: 2px; align-items: center; }
  .cal-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.3px;
    padding: 2px 5px; border-radius: 6px; line-height: 1.4;
    text-transform: uppercase; display: block;
  }
  .cal-badges { min-height: 16px; }
  .cal-badge.d1 { background: rgba(48,209,88,0.2); color: #30d158; }
  .cal-badge.d2 { background: rgba(10,132,255,0.2); color: #0a84ff; }
  .cal-badge.d3 { background: rgba(245,166,35,0.2); color: #f5a623; }
  .cal-badge.pasos { background: rgba(100,210,255,0.15); color: #64d2ff; }
  .cal-badge.cardio { background: rgba(255,69,58,0.15); color: #ff453a; }
  .cal-badge.descanso { background: rgba(255,255,255,0.06); color: var(--text3); }
  .cal-badge.hecho { opacity: 1; }
  .cal-badge.plan { opacity: 0.5; }

  /* MODAL ACTIVIDAD */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 300; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--bg2); border-radius: 20px 20px 0 0;
    width: 100%; padding: 20px 20px 40px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1);
    border-top: 1px solid var(--border);
  }
  .modal-overlay.visible .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-fecha { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .modal-titulo { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

  .actividad-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 20px; }
  .actividad-btn {
    padding: 14px 12px; border-radius: var(--radius);
    border: 1.5px solid var(--border); background: var(--bg3);
    color: var(--text); font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .actividad-btn:active { transform: scale(0.97); }
  .actividad-btn.selected { border-color: var(--accent); background: rgba(245,166,35,0.12); }
  .actividad-btn .act-icon { font-size: 24px; }
  .actividad-btn.ir-sesion { grid-column: 1/-1; background: var(--accent); color: #000; border-color: var(--accent); }

  .semana-info {
    margin: 0 16px 16px;
    padding: 12px 16px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; justify-content: space-between; align-items: center;
  }
  .semana-info-label { font-size: 13px; color: var(--text2); }
  .semana-info-valor { font-size: 15px; font-weight: 700; color: var(--accent); }


  /* ── PROGRESO ── */
  .progreso-bloque {
    margin: 0 16px 16px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .progreso-bloque-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .progreso-bloque-titulo { font-size: 15px; font-weight: 700; }
  .progreso-bloque-sub { font-size: 12px; color: var(--text2); }

  .kg-hero {
    padding: 20px 16px;
    text-align: center;
  }
  .kg-hero-valor { font-size: 48px; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
  .kg-hero-label { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .kg-hero-delta { font-size: 13px; font-weight: 600; margin-top: 6px; }

  .kg-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    border-top: 1px solid var(--border);
  }
  .kg-grid-item {
    padding: 12px 8px; text-align: center;
    border-right: 1px solid var(--border);
  }
  .kg-grid-item:last-child { border-right: none; }
  .kg-grid-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .kg-grid-valor { font-size: 16px; font-weight: 700; }

  .semana-tabs {
    display: flex; border-bottom: 1px solid var(--border);
  }
  .semana-tab {
    flex: 1; padding: 10px; text-align: center;
    font-size: 12px; font-weight: 600; color: var(--text2);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .semana-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .vol-item {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .vol-item:last-child { border-bottom: none; }
  .vol-item-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
  }
  .vol-item-nombre { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .vol-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .vol-item-nums { font-size: 12px; color: var(--text2); }
  .vol-bar-bg {
    height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; position: relative;
  }
  .vol-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .vol-bar-target { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.15); }
  .vol-ritmo { font-size: 11px; font-weight: 600; margin-top: 4px; }
  .vol-ritmo.ok { color: var(--green); }
  .vol-ritmo.bajo { color: var(--accent); }
  .vol-ritmo.alto { color: var(--blue); }

  .prog-ejercicio-item {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .prog-ejercicio-item:last-child { border-bottom: none; }
  .prog-ej-nombre { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .prog-ej-sub { font-size: 12px; color: var(--text2); }
  .prog-ej-badge {
    font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px; flex-shrink: 0;
  }
  .prog-ej-badge.sube { background: rgba(48,209,88,0.15); color: var(--green); }
  .prog-ej-badge.igual { background: rgba(255,255,255,0.06); color: var(--text2); }
  .prog-ej-badge.baja { background: rgba(255,69,58,0.15); color: var(--red); }

  .empty-progreso {
    padding: 32px 16px; text-align: center;
    color: var(--text2); font-size: 14px; line-height: 1.6;
  }

  /* ── MEDIDAS ── */
  .medidas-nav {

<script>
const SHEET_ID = '12ZelEyxHdbGclemJE3yF7E1gHOmUmQpupZzvHmjhIUM';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyyXS2dhcCkOCDriYdGBe8UVTU0W2cVgp8v3xxHuFxmnNIh3-fZOw9tAC7cYyMioV1EDw/exec';
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

let state = {
  config: null, sesiones: [], ejercicios: [],
  registroSeries: [], registroEjercicios: [],
  sesionActual: null, ejercicioActual: null,
  seriesLocales: {},
};

let descansoInterval = null;
let descansoRestante = 0;
let descansoTotal = 0;

// ── UTILS ──
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  window.scrollTo(0, 0);
}

function uniqueId(prefix) {
  return prefix + Date.now() + Math.random().toString(36).substr(2,5);
}

// ── FETCH SHEETS ──
async function fetchSheet(name) {
  const res = await fetch(BASE + encodeURIComponent(name));
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!match) throw new Error('Formato de respuesta inesperado de Google Sheets');
  const json = JSON.parse(match[1]);
  const cols = json.table.cols.map(c => c.label);
  if (name === 'EjerciciosPlan') console.log('Columnas EjerciciosPlan:', cols);
  return json.table.rows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => { obj[cols[i]] = cell ? (cell.v !== null ? cell.v : '') : ''; });
    return obj;
  });
}

// ── INIT ──
async function init() {
  try {
    const [config, sesiones, ejercicios, regSeries, regEjercicios] = await Promise.all([
      fetchSheet('Configuracion'), fetchSheet('Sesiones'),
      fetchSheet('EjerciciosPlan'), fetchSheet('RegistroSeries'),
      fetchSheet('RegistroEjercicios'),
    ]);
    state.config = config[0];
    state.sesiones = sesiones;
    state.ejercicios = ejercicios;
    state.registroSeries = regSeries;
    state.registroEjercicios = regEjercicios;

    // Calcular semana automáticamente desde FechaInicio
    calcularSemanaActual();

    // Cargar actividades guardadas del calendario
    await cargarActividadesCalendario();

    console.log('Config:', state.config);
    initCalendario();
  } catch(e) {
    document.getElementById('sesiones-sub').innerHTML =
      `<div class="error-box">❌ Error al cargar datos.<br><br>${e.message}<br><br>
      Asegúrate de que la Google Sheet está compartida como "Cualquier persona con el enlace puede ver".</div>`;
  }
}

// ── RENDER SESIONES ──
function renderSesiones() {
  // renderSesiones ya no controla la pantalla de inicio (lo hace initCalendario)
  // Se mantiene para compatibilidad con selectSesion y navegación
}

// ── GRUPO MUSCULAR ICON ──
function grupoIcon(grupo) {
  const map = {
    'Pecho': '🫁', 'Espalda': '🔙', 'Hombro': '💪',
    'Bíceps': '💪', 'Tríceps': '💪', 'Cuádriceps': '🦵',
    'Isquio': '🦵', 'Glúteo': '🍑', 'Core': '⚡', 'Otro': '🏋️'
  };
  return map[grupo] || '🏋️';
}

// ── SELECT SESION ──
function selectSesion(idSesion) {
  state.sesionActual = state.sesiones.find(s => s.ID_Sesion === idSesion);
  const ejercicios = state.ejercicios
    .filter(e => e.ID_Sesion === idSesion)
    .sort((a,b) => parseInt(a.Orden) - parseInt(b.Orden));

  document.getElementById('ejercicios-title').textContent = state.sesionActual.NombreSesion;
  document.getElementById('ejercicios-sub').textContent = `${ejercicios.length} ejercicios`;

  const completadosIds = new Set([
    ...state.registroEjercicios
      .filter(re => re.EjercicioCompletado === true || re.EjercicioCompletado === 'TRUE')
      .map(re => re.ID_EjercicioPlan),
    ...Object.entries(state.seriesLocales)
      .filter(([id, series]) => {
        const ej = state.ejercicios.find(e => e.ID_EjercicioPlan === id);
        return ej && series.filter(s=>s.completada).length >= parseInt(ej.SeriesObjetivo);
      })
      .map(([id]) => id)
  ]);

  document.getElementById('ejercicios-list').innerHTML = ejercicios.map((e, idx) => {
    const completado = completadosIds.has(e.ID_EjercicioPlan);
    const pesoInfo = getUltimoPesoInfo(e);
    const ultimoPeso = pesoInfo.peso;
    const pesoRec = getPesoRecomendado(e, ultimoPeso);
    const seriesHechas = (state.seriesLocales[e.ID_EjercicioPlan] || []).filter(s=>s.completada).length;
    const icono = grupoIcon(e.GrupoMuscular);
    const evolucion = getEvolucionPeso(e);
    const evolucionHtml = renderEvolucion(evolucion);

    // Etiqueta de peso según fuente
    let pesoTag = '';
    if (ultimoPeso > 0) {
      if (pesoInfo.fuente === 'historial') {
        pesoTag = `<span class="tag" style="color:var(--green);background:rgba(48,209,88,0.12)">✓ Último: ${ultimoPeso}kg</span>`;
      } else if (pesoInfo.fuente === 'plan') {
        pesoTag = `<span class="tag" style="color:var(--blue);background:rgba(10,132,255,0.12)">📋 Ref: ${ultimoPeso}kg</span>`;
      }
    }
    const recTag = pesoRec>0 ? `<span class="tag" style="color:var(--accent);background:rgba(245,166,35,0.12)">⬆ Hoy: ${pesoRec}kg</span>` : '';
    const seriesTag = seriesHechas>0&&!completado ? `<span class="tag" style="color:var(--blue);background:rgba(10,132,255,0.12)">${seriesHechas}/${e.SeriesObjetivo} series</span>` : '';

    return `<div class="ejercicio-card ${completado?'completado':''}" onclick="selectEjercicio('${e.ID_EjercicioPlan}')">
      <div class="ejercicio-header">
        <div style="flex:1">
          <div class="ejercicio-nombre">${icono} ${e.NombreEjercicio}</div>
          <div class="ejercicio-tags">
            <span class="tag">${e.GrupoMuscular}</span>
            <span class="tag accent">${e.SeriesObjetivo}×${e.RepsObjetivo} · RIR ${e.RIRObjetivo}</span>
            ${pesoTag}
            ${recTag}
            ${seriesTag}
          </div>
          ${evolucionHtml}
        </div>
        <div class="estado-badge ${completado?'completado':''}">
          ${completado?'<svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>':''}
        </div>
      </div>
      <div class="ejercicio-footer">
        <div class="ejercicio-footer-item">⏱ <span>${e.DescansoSegundos}s</span></div>
        ${e.NotasEntrenador?`<div class="ejercicio-footer-item" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">💡 ${e.NotasEntrenador.substring(0,40)}${e.NotasEntrenador.length>40?'…':''}</div>`:''}
        ${e.URLVideo?`<a class="btn-video" href="${e.URLVideo}" target="_blank" onclick="event.stopPropagation()">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M2 1.5l6 3.5-6 3.5V1.5z"/></svg>
          Ver
        </a>`:''}
      </div>
    </div>`;
  }).join('');

  goTo('ejercicios');
}

// ── PESO UTILS ──
// Devuelve {peso, fuente} — fuente puede ser 'historial', 'plan' o null
function getUltimoPesoInfo(ejercicio) {
  // 1. Buscar en historial de series registradas (mismo ID_EjercicioPlan)
  const seriesMismoId = state.registroSeries.filter(r =>
    r.ID_EjercicioPlan === ejercicio.ID_EjercicioPlan && parseFloat(r.Peso) > 0
  );
  if (seriesMismoId.length) {
    // Ordenar por timestamp descendente y coger el más reciente
    const sorted = seriesMismoId.sort((a,b) => {
      const ta = new Date(a.Timestamp||a.Fecha||0).getTime();
      const tb = new Date(b.Timestamp||b.Fecha||0).getTime();
      return tb - ta;
    });
    const pesoMax = Math.max(...seriesMismoId.map(r => parseFloat(r.Peso)||0));
    return { peso: pesoMax, fuente: 'historial' };
  }

  // 2. Buscar en mesociclos anteriores por nombre de ejercicio
  const nombreEj = ejercicio.NombreEjercicio?.trim().toLowerCase();
  const seriesNombre = state.registroSeries.filter(r => {
    const ejPlan = state.ejercicios.find(e => e.ID_EjercicioPlan === r.ID_EjercicioPlan);
    return ejPlan && ejPlan.NombreEjercicio?.trim().toLowerCase() === nombreEj && parseFloat(r.Peso) > 0;
  });
  if (seriesNombre.length) {
    const pesoMax = Math.max(...seriesNombre.map(r => parseFloat(r.Peso)||0));
    return { peso: pesoMax, fuente: 'historial' };
  }

  // 3. Fallback: usar PesoActual del plan (buscar con varios nombres posibles)
  const pesoActual = parseFloat(
    ejercicio.PesoActual ||
    ejercicio['Peso Actual'] ||
    ejercicio['PesoActual '] ||
    ejercicio[' PesoActual'] ||
    Object.entries(ejercicio).find(([k]) => k.toLowerCase().includes('peso') && k.toLowerCase().includes('actual'))?.[1] ||
    0
  );
  if (pesoActual > 0) return { peso: pesoActual, fuente: 'plan' };

  return { peso: 0, fuente: null };
}

function getUltimoPeso(ejercicio) {
  if (typeof ejercicio === 'string') {
    const ej = state.ejercicios.find(e => e.ID_EjercicioPlan === ejercicio);
    return ej ? getUltimoPesoInfo(ej).peso : 0;
  }
  return getUltimoPesoInfo(ejercicio).peso;
}

// Devuelve array de {mesociclo, peso} con la evolución histórica del ejercicio
// Normaliza nombre eliminando variantes para comparación flexible
function normNombre(n) {
  return (n||'').toLowerCase()
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i')
    .replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/ñ/g,'n')
    .replace(/\bcon pausa\b|\blastrad[ao]\b|\bconvencional\b|\bsimetric[ao]\b/g,'')
    .replace(/\bagarre (ancho|cerrado|neutro|prono|pron[ao])\b/g,'')
    .replace(/\b(de pie|pie medial|medial|t&g|2m|1m|2 manos|1 mano|media altura)\b/g,'')
    .replace(/\b(mancuerna|barra|2p|inclinado|plano|neutro|prono|proma|promo|unilateral|dinamico)\b/g,'')
    .replace(/\s+/g,' ').trim();
}

function mismoEj(n1, n2) {
  const a = normNombre(n1), b = normNombre(n2);
  if (a === b) return true;
  if (a.length > 4 && b.includes(a)) return true;
  if (b.length > 4 && a.includes(b)) return true;
  return false;
}

function getEvolucionPeso(ejercicio) {
  const nombre = ejercicio.NombreEjercicio || '';
  if (!nombre) return [];
  const mesociclos = ['M1','M2','M3','M4','M5'];
  const evolucion = [];

  for (const m of mesociclos) {
    const ejs = state.ejercicios.filter(e => {
      const id = e.ID_EjercicioPlan || '';
      const peso = parseFloat(String(e.PesoActual || e['Peso Actual'] || '0').replace(',','.')) || 0;
      return id.startsWith(`${m}-S1-`) && peso > 0 && mismoEj(e.NombreEjercicio, nombre);
    });
    if (ejs.length > 0) {
      const peso = parseFloat(String(ejs[0].PesoActual || ejs[0]['Peso Actual'] || '0').replace(',','.')) || 0;
      if (peso > 0) {
        const ant = evolucion[evolucion.length-1];
        if (!ant || ant.peso !== peso) evolucion.push({ mesociclo: m, peso });
      }
    }
    // Sustituir con datos reales si existen
    const reales = state.registroSeries.filter(r => {
      const ep = state.ejercicios.find(e => e.ID_EjercicioPlan === r.ID_EjercicioPlan);
      return ep && (ep.ID_EjercicioPlan||'').startsWith(m) &&
             mismoEj(ep.NombreEjercicio, nombre) && parseFloat(r.Peso) > 0;
    });
    if (reales.length > 0) {
      const pesoMax = Math.max(...reales.map(r => parseFloat(r.Peso)||0));
      const idx = evolucion.findIndex(e => e.mesociclo === m);
      if (idx >= 0) { evolucion[idx].peso = pesoMax; evolucion[idx].real = true; }
    }
  }
  return evolucion;
}

function renderEvolucion(evolucion) {
  if (evolucion.length < 2) return '';
  const primero = evolucion[0].peso;
  const ultimo  = evolucion[evolucion.length-1].peso;
  const tendencia = ultimo > primero ? '↑' : (ultimo < primero ? '↓' : '→');
  const color = ultimo > primero ? 'var(--green)' : (ultimo < primero ? 'var(--red)' : 'var(--text2)');
  const pesos = evolucion.map(e => e.peso + 'kg').join(' → ');
  return `<div class="evolucion-bar" style="color:${color};margin-top:6px">${pesos} ${tendencia}</div>`;
}

function getPesoRecomendado(ejercicio, ultimoPeso) {
  if (ultimoPeso === 0) return 0;
  const seriesReg = state.registroSeries.filter(r =>
    r.ID_EjercicioPlan === ejercicio.ID_EjercicioPlan &&
    (r.Completada===true||r.Completada==='TRUE')
  );
  if (seriesReg.length < parseInt(ejercicio.SeriesObjetivo)) return 0;
  const repsObj = parseInt(String(ejercicio.RepsObjetivo).split('-')[0]) || 0;
  const rirObj  = parseInt(String(ejercicio.RIRObjetivo).split('-')[0])  || 0;
  const todasRepsOk = seriesReg.every(s => parseInt(s.RepsRealizadas) >= repsObj);
  const todoRIROk   = seriesReg.every(s => parseInt(s.RIRReal) > rirObj);
  if (todasRepsOk && todoRIROk) {
    const inc = ejercicio.CategoriaProgresion==='Tren superior'?2.5:
                ejercicio.CategoriaProgresion==='Tren inferior'?5:1;
    return ultimoPeso + inc;
  }
  return 0;
}

function toggleSerie(idx) {

// ── TEMPORIZADOR ──
function iniciarDescanso(segundos) {
  pararDescanso();
  if (segundos <= 0) return;
  descansoTotal = segundos;
  descansoRestante = segundos;
  const bar = document.getElementById('timer-bar');
  if (bar) bar.classList.add('visible');
  actualizarTimer();
  descansoInterval = setInterval(() => {
    descansoRestante--;
    actualizarTimer();
    if (descansoRestante <= 0) {
      pararDescanso();
      showToast('¡Descansado! A por la siguiente 💪', 'success');
      if ('vibrate' in navigator) navigator.vibrate([200,100,200]);
    }
  }, 1000);
}

function pararDescanso() {
  if (descansoInterval) { clearInterval(descansoInterval); descansoInterval = null; }
  const bar = document.getElementById('timer-bar');
  if (bar) bar.classList.remove('visible');
}

function actualizarTimer() {
  const count = document.getElementById('timer-count');
  const prog = document.getElementById('timer-progress-bar');
  if (count) count.textContent = descansoRestante + 's';
  if (prog) prog.style.width = ((descansoRestante / descansoTotal) * 100) + '%';
}

function actualizarBotonGuardar() {
  const id = state.ejercicioActual?.ID_EjercicioPlan;
  const btn = document.getElementById('btn-guardar');
  if (!id || !btn) return;
  const series = state.seriesLocales[id] || [];
  const n = series.filter(s=>s.completada).length;
  btn.textContent = n === 0 ? 'Guardar ejercicio' : `Guardar (${n}/${series.length} series completadas)`;
  btn.disabled = n === 0;
}

// ── GUARDAR ──
async function guardarEjercicio() {
  const e = state.ejercicioActual;
  const series = state.seriesLocales[e.ID_EjercicioPlan] || [];
  const notas = document.getElementById('notas-ejercicio')?.value || '';
  const completadas = series.filter(s => s.completada);
  if (!completadas.length) { showToast('Completa al menos una serie'); return; }

  const btn = document.getElementById('btn-guardar');
  btn.disabled = true; btn.textContent = 'Guardando...';

  const fecha = new Date().toLocaleDateString('es-ES');
  const timestamp = new Date().toISOString();

  const rowsSeries = completadas.map((s, i) => ({
    ID_RegistroSerie: uniqueId('R'),
    ID_EjercicioPlan: e.ID_EjercicioPlan,
    Fecha: fecha, Timestamp: timestamp,
    NumeroSerie: i + 1,
    Peso: parseFloat(s.peso) || 0,
    RepsRealizadas: parseInt(s.reps) || 0,
    RIRReal: parseInt(s.rir) || 0,
    ComentarioSerie: notas,
    Completada: true,
  }));

  const rowEjercicio = {
    ID_RegistroEjercicio: uniqueId('RE'),
    ID_EjercicioPlan: e.ID_EjercicioPlan,
    Fecha: fecha, ComentarioGeneral: notas,
    EjercicioCompletado: completadas.length >= parseInt(e.SeriesObjetivo),
  };

  try {
    // Guardar series
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ type: 'series', rows: rowsSeries }),
    });

    // Guardar ejercicio
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ type: 'ejercicio', row: rowEjercicio }),
    });

    // Actualizar estado local
    rowsSeries.forEach(r => state.registroSeries.push(r));
    state.registroEjercicios.push(rowEjercicio);

    pararDescanso();
    showToast('Guardado en Google Sheets ✓', 'success');

    setTimeout(() => {
      selectSesion(state.sesionActual.ID_Sesion);
    }, 900);

  } catch(err) {
    btn.disabled = false;
    btn.textContent = 'Guardar ejercicio';
    showToast('Error al guardar: ' + err.message, 'error');
  }
}

// ── CÁLCULO AUTOMÁTICO DE SEMANA ──
function calcularSemanaActual() {
  if (!state.config) return;

  // Log completo de lo que llega desde la Sheet
  console.log('Config completo:', JSON.stringify(state.config));

  const fechaInicioRaw = state.config.FechaInicio ||
                         state.config.fechainicio ||
                         state.config.FECHAINICIO || '';
  console.log('FechaInicio raw:', fechaInicioRaw, typeof fechaInicioRaw);

  let fechaInicio = null;

  if (!fechaInicioRaw || fechaInicioRaw === '') {
    // Sin fecha, usar semana 1
    state.config._semanaCalculada = 1;
    console.warn('Sin FechaInicio — usando semana 1');
    return;
  }

  const raw = String(fechaInicioRaw).trim();

  try {
    if (raw.includes('/')) {
      // D/M/YYYY o DD/MM/YYYY
      const p = raw.split('/');
      const dia  = parseInt(p[0]);
      const mes  = parseInt(p[1]) - 1;
      const anyo = parseInt(p[2]);
      fechaInicio = new Date(anyo < 100 ? 2000+anyo : anyo, mes, dia);
    } else if (raw.includes('-')) {
      // YYYY-MM-DD
      const p = raw.split('-');
      fechaInicio = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
    } else if (!isNaN(Number(raw))) {
      // Serial de Google Sheets
      const serial = Number(raw);
      const d = new Date(Math.round((serial - 25569) * 86400 * 1000));
      fechaInicio = new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
    }
  } catch(e) {
    console.error('Error parseando fecha:', e);
  }

  console.log('FechaInicio parseada:', fechaInicio);

  if (!fechaInicio || isNaN(fechaInicio.getTime())) {
    console.warn('No se pudo parsear FechaInicio:', raw, '— usando semana 1');
    state.config._semanaCalculada = 1;
    // Usar fecha hardcodeada como fallback (22/6/2026)
    fechaInicio = new Date(2026, 5, 22); // Junio = mes 5
    console.log('Usando fecha fallback:', fechaInicio);
  }

  fechaInicio.setHours(0,0,0,0);
  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  const dias = Math.floor((hoy - fechaInicio) / 86400000);
  const sem = Math.min(Math.max(Math.floor(dias / 7) + 1, 1), 4);

  state.config._semanaCalculada = sem;
  state.config._fechaInicioObj = fechaInicio;
  console.log('Resultado — Semana:', sem, '| Días:', dias, '| Inicio:', fechaInicio.toDateString());
}

// Devuelve la semana actual calculada automáticamente
function getSemanaActual() {
  return state.config?._semanaCalculada || parseInt(state.config?.SemanaActual || 1);
}

// Devuelve el rango de fechas de una semana del mesociclo
function getFechasSemana(numSemana) {
  if (!state.config?._fechaInicioObj) return null;
  const inicio = new Date(state.config._fechaInicioObj);
  inicio.setDate(inicio.getDate() + (numSemana - 1) * 7);
  const fin = new Date(inicio);
  fin.setDate(fin.getDate() + 6);
  return { inicio, fin };
}

// Devuelve a qué semana del mesociclo pertenece una fecha
function getSemanaDeUnaFecha(fecha) {
  if (!state.config) return null;

  // Obtener fecha inicio — intentar desde _fechaInicioObj o recalcular
  let inicio = state.config._fechaInicioObj;
  if (!inicio) {
    calcularSemanaActual();
    inicio = state.config._fechaInicioObj;
  }
  if (!inicio) return null;

  // Comparar solo fechas (sin horas) para evitar offset
  const inicioSolo = new Date(inicio.getFullYear(), inicio.getMonth(), inicio.getDate());
  const fechaSolo  = new Date(fecha.getFullYear(), fecha.getMonth(), fecha.getDate());
  const dias = Math.floor((fechaSolo - inicioSolo) / (1000 * 60 * 60 * 24));
  if (dias < 0) return null;
  const sem = Math.floor(dias / 7) + 1;
  return sem >= 1 && sem <= 4 ? sem : null;
}


// ── CALENDARIO ──
const DIAS_SEMANA = ['L','M','X','J','V','S','D'];
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let calFecha = new Date(); // mes actual
let actividadesDias = {}; // { 'YYYY-MM-DD': { tipo, sesion, hecho } }

// Tipos de actividad
const TIPOS_ACTIVIDAD = [
  { id: 'fuerza-d1', label: 'D1 Piernas+Brazos', icon: '💪', badge: 'd1', badgeText: 'D1' },
  { id: 'fuerza-d2', label: 'D2 Empuje+Espalda', icon: '🏋️', badge: 'd2', badgeText: 'D2' },
  { id: 'fuerza-d3', label: 'D3 Vertical+Post.', icon: '🔥', badge: 'd3', badgeText: 'D3' },
  { id: 'pasos',     label: '10k Pasos / Caminar', icon: '🚶', badge: 'pasos', badgeText: '10K' },
  { id: 'cardio',    label: 'Cardio extra', icon: '🚴', badge: 'cardio', badgeText: 'CAR' },
  { id: 'descanso',  label: 'Descanso', icon: '😴', badge: 'descanso', badgeText: 'DSC' },
];

// Calcular qué sesión toca cada semana según mesociclo
function getSesionDelMes(fecha) {
  if (!state.config) return null;
  const meso = state.config.MesocicloActual || 'M5';

  // Obtener fecha inicio
  let inicio = state.config._fechaInicioObj;
  if (!inicio) {
    calcularSemanaActual();
    inicio = state.config._fechaInicioObj;
  }
  if (!inicio) return null;

  // Normalizar las dos fechas a medianoche
  const ini = new Date(inicio.getFullYear(), inicio.getMonth(), inicio.getDate());
  const dia = new Date(fecha.getFullYear(), fecha.getMonth(), fecha.getDate());

  // Calcular días desde inicio
  const dias = Math.round((dia - ini) / 86400000);
  if (dias < 0) return null;

  // Calcular semana (0-3) y día dentro de la semana (0-6, 0=lunes)
  const semana = Math.floor(dias / 7);
  if (semana >= 4) return null; // Fuera del mesociclo

  const diaSemana = dias % 7; // 0=primer día del meso, 2=tercer día, 4=quinto día

  // El mesociclo empieza en lunes
  // D1 = día 0 de cada semana (lunes)
  // D2 = día 2 de cada semana (miércoles)
  // D3 = día 4 de cada semana (viernes)
  let sesion = null;
  if (diaSemana === 0) sesion = 'D1';
  else if (diaSemana === 2) sesion = 'D2';
  else if (diaSemana === 4) sesion = 'D3';

  if (!sesion) return null;
  return { sesion, semana: semana + 1, mesociclo: meso };
}

function keyFecha(fecha) {
  // Usar fecha local para evitar problemas de zona horaria (España UTC+2)
  const y = fecha.getFullYear();
  const m = String(fecha.getMonth()+1).padStart(2,'0');
  const d = String(fecha.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + d;
}

function renderCalendario() {
  try {
  const year = calFecha.getFullYear();
  const month = calFecha.getMonth();
  const hoy = new Date();

  const elTitulo = document.getElementById('cal-mes-titulo');
  if (!elTitulo) { console.error('cal-mes-titulo not found'); return; }
  elTitulo.textContent = MESES[month] + ' ' + year;

  // Cabeceras días
  let html = DIAS_SEMANA.map(d =>
    `<div class="cal-dia-header">${d}</div>`
  ).join('');

  // Primer día del mes (0=dom, ajustar a lun=0)
  const primerDia = new Date(year, month, 1);
  const offsetInicio = primerDia.getDay() === 0 ? 6 : primerDia.getDay() - 1;
  const diasEnMes = new Date(year, month + 1, 0).getDate();

  // Días vacíos al inicio
  for (let i = 0; i < offsetInicio; i++) {
    html += `<div class="cal-dia vacio"></div>`;
  }

  // Días del mes
  for (let d = 1; d <= diasEnMes; d++) {
    const fecha = new Date(year, month, d);
    const key = keyFecha(fecha);
    const esHoy = fecha.toDateString() === hoy.toDateString();
    const sesionPlan = getSesionDelDia(key) || getSesionDelMes(fecha);
    const actReg = actividadesDias[key]; // actividad registrada manualmente

    let badges = '';
    if (actReg) {
      const tipo = TIPOS_ACTIVIDAD.find(t => t.id === actReg.tipo);
      if (tipo) badges = `<div class="cal-badge ${tipo.badge} hecho">${tipo.badgeText}</div>`;
    } else if (sesionPlan) {
      const badge = sesionPlan.sesion.toLowerCase();
      badges = `<div class="cal-badge ${badge} plan">${sesionPlan.sesion}</div>`;
    }

    html += `<div class="cal-dia${esHoy?' hoy':''}${!badges?' sin-act':''}"
      onclick="abrirModal('${key}', ${d})">
      <div class="cal-dia-num">${d}</div>
      <div class="cal-badges">${badges}</div>
    </div>`;
  }

  const calGrid = document.getElementById('cal-grid');
  if (calGrid) calGrid.innerHTML = html;
  else console.error('cal-grid not found');
  } catch(err) { console.error('renderCalendario error:', err); }
}

function getSesionDelDia(key) {
  const act = actividadesDias[key];
  if (!act) return null;
  if (act.tipo === 'fuerza-d1') return { sesion: 'D1' };
  if (act.tipo === 'fuerza-d2') return { sesion: 'D2' };
  if (act.tipo === 'fuerza-d3') return { sesion: 'D3' };
  return null;
}

function cambiarMes(delta) {
  calFecha = new Date(calFecha.getFullYear(), calFecha.getMonth() + delta, 1);
  renderCalendario();
}

  if (actReg && ['fuerza-d1','fuerza-d2','fuerza-d3'].includes(actReg.tipo)) {
    const sesion = actReg.tipo.replace('fuerza-','').toUpperCase();
    const idSes = `${state.config?.MesocicloActual||'M5'}-S${state.config?.SemanaActual||1}-${sesion}`;
    html += `<button class="actividad-btn ir-sesion" onclick="irASesion('${idSes}')">
      💪 Ir a los ejercicios de ${sesion}
    </button>`;
  } else if (sesionPlan && !actReg) {
    const idSes = `${sesionPlan.mesociclo}-S${sesionPlan.semana}-${sesionPlan.sesion}`;
    html += `<button class="actividad-btn ir-sesion" onclick="registrarYIr('${key}','fuerza-${sesionPlan.sesion.toLowerCase()}','${idSes}')">
      💪 Registrar y hacer ${sesionPlan.sesion}
    </button>`;
  }

  document.getElementById('modal-actividades').innerHTML = html;
  document.getElementById('modal-actividad').classList.add('visible');
}

function seleccionarActividad(tipo) {
  actividadSeleccionada = tipo;
  actividadesDias[modalDiaKey] = { tipo, hecho: true };
  guardarActividadCalendario(modalDiaKey, tipo); // Guardar en Sheet
  cerrarModal();
  renderCalendario();
  showToast('Actividad registrada ✓', 'success');
}

function irASesion(idSesion) {
  cerrarModal();
  selectSesion(idSesion);
}

function registrarYIr(key, tipo, idSesion) {
  actividadesDias[key] = { tipo, hecho: true };
  guardarActividadCalendario(key, tipo); // Guardar en Sheet
  cerrarModal();
  selectSesion(idSesion);
}

function cerrarModal(e) {
  if (e && e.target !== document.getElementById('modal-actividad')) return;
  document.getElementById('modal-actividad').classList.remove('visible');
}

// ── INIT CALENDARIO ──
function initCalendario() {
  try {
    if (!state.config) return;
    const meso = state.config.MesocicloActual || 'M5';
    const sem = getSemanaActual();

    // Ocultar spinner de carga
    const sub = document.getElementById('sesiones-sub');
    if (sub) sub.style.display = 'none';

    // Mostrar info semana
    document.getElementById('semana-info').style.removeProperty('display');
    document.getElementById('semana-info').style.display = 'flex';
    document.getElementById('semana-info-label').textContent = meso + ' · Semana ' + sem + ' de 4';
    document.getElementById('semana-info-sub').textContent = 'L=D1 · X=D2 · V=D3 · pulsa un día para registrar';
    document.getElementById('semana-info-valor').textContent = 'S' + sem;

    // Mostrar cabecera del calendario
    document.getElementById('cal-header').style.display = 'flex';

    // Renderizar calendario
    renderCalendario();

  } catch(err) {
    // Si falla, mostrar error visible en pantalla
    const sub = document.getElementById('sesiones-sub');
    if (sub) {
      sub.style.display = 'block';
      sub.innerHTML = '<div class="error-box">Error iniciando calendario: ' + err.message + '</div>';
    }
    console.error('initCalendario error:', err.message, err.stack);
  }
}

const GRUPOS_COLORES = {
  'Cuádriceps': '#30d158', 'Isquio': '#30d158', 'Glúteo': '#30d158',
  'Pecho': '#0a84ff', 'Espalda': '#5e5ce6', 'Hombro': '#64d2ff',
  'Bíceps': '#ff9f0a', 'Tríceps': '#ff6961', 'Core': '#98989d', 'Cardio': '#98989d',
};

// Rangos óptimos de series semanales por grupo (MEV-MRV Israetel)
const RANGOS_SEMANALES = {
  'Cuádriceps': [8, 18], 'Isquio': [6, 16], 'Glúteo': [6, 16],
  'Pecho': [10, 20], 'Espalda': [10, 20], 'Hombro': [8, 20],
  'Bíceps': [8, 18], 'Tríceps': [8, 18], 'Core': [6, 16],
};

function getRegistrosM5() {
  const meso = state.config?.MesocicloActual || 'M5';
  // Series completadas del mesociclo actual
  return state.registroSeries.filter(r => {
    const ep = state.ejercicios.find(e => e.ID_EjercicioPlan === r.ID_EjercicioPlan);
    return ep && (ep.ID_EjercicioPlan||'').startsWith(meso) &&
           (r.Completada === true || r.Completada === 'TRUE');
  });
}

function getSeriesPlanM5() {
  const meso = state.config?.MesocicloActual || 'M5';
  return state.ejercicios.filter(e => (e.ID_EjercicioPlan||'').startsWith(meso));
}

function calcularKgMovidos(registros) {
  return registros.reduce((sum, r) => {
    const peso = parseFloat(r.Peso) || 0;
    const reps = parseInt(r.RepsRealizadas) || 0;
    return sum + (peso * reps);
  }, 0);
}

function renderProgreso() {
  const meso = state.config?.MesocicloActual || 'M5';
  const semanaActual = getSemanaActual();
  document.getElementById('progreso-sub').textContent = `${meso} · Semana ${semanaActual} de 4`;

  const registros = getRegistrosM5();
  const plan = getSeriesPlanM5();

  let html = '';

  // ── BLOQUE 1: KG MOVIDOS ──
  const kgTotal = calcularKgMovidos(registros);

  // Por sesión
  const kgPorSesion = { D1: 0, D2: 0, D3: 0 };
  registros.forEach(r => {
    const ep = state.ejercicios.find(e => e.ID_EjercicioPlan === r.ID_EjercicioPlan);
    if (!ep) return;
    const id = ep.ID_EjercicioPlan || '';
    const d = id.includes('-D1-') ? 'D1' : id.includes('-D2-') ? 'D2' : 'D3';
    kgPorSesion[d] += (parseFloat(r.Peso)||0) * (parseInt(r.RepsRealizadas)||0);
  });

  // Por semana
  const kgPorSemana = {};
  for (let s = 1; s <= 4; s++) kgPorSemana[s] = 0;
  registros.forEach(r => {
    const ep = state.ejercicios.find(e => e.ID_EjercicioPlan === r.ID_EjercicioPlan);
    if (!ep) return;
    const id = ep.ID_EjercicioPlan || '';
    const match = id.match(/-S(\d+)-/);
    const sem = match ? parseInt(match[1]) : 0;
    if (sem >= 1 && sem <= 4) {
      kgPorSemana[sem] += (parseFloat(r.Peso)||0) * (parseInt(r.RepsRealizadas)||0);
    }
  });

  const formatKg = n => Math.round(n).toLocaleString('es-ES') + ' kg';

  html += `<div class="progreso-bloque">
    <div class="progreso-bloque-header">
      <div>
        <div class="progreso-bloque-titulo">⚡ Kilos movidos</div>
        <div class="progreso-bloque-sub">Peso × Reps acumulado en ${meso}</div>
      </div>
    </div>
    <div class="kg-hero">
      <div class="kg-hero-valor">${formatKg(kgTotal)}</div>
      <div class="kg-hero-label">Total mesociclo hasta hoy</div>
      ${kgTotal === 0 ? `<div style="color:var(--text3);font-size:13px;margin-top:8px">Empieza a registrar sesiones para ver tus datos</div>` : ''}
    </div>
    <div class="kg-grid">
      <div class="kg-grid-item">
        <div class="kg-grid-label" style="color:#30d158">D1</div>
        <div class="kg-grid-valor">${formatKg(kgPorSesion.D1)}</div>
      </div>
      <div class="kg-grid-item">
        <div class="kg-grid-label" style="color:#0a84ff">D2</div>
        <div class="kg-grid-valor">${formatKg(kgPorSesion.D2)}</div>
      </div>
      <div class="kg-grid-item">
        <div class="kg-grid-label" style="color:#f5a623">D3</div>
        <div class="kg-grid-valor">${formatKg(kgPorSesion.D3)}</div>
      </div>
    </div>
    ${semanaActual > 1 ? `
    <div class="semana-tabs">
      ${[1,2,3,4].map(s => `
        <div class="semana-tab ${s===semanaActual?'active':''}" onclick="filtrarSemana(${s})">
          S${s}${s===semanaActual?' ·':''} ${s < semanaActual ? formatKg(kgPorSemana[s]) : s===semanaActual ? '↑' : ''}
        </div>`).join('')}
    </div>` : ''}
  </div>`;

  // ── BLOQUE 2: VOLUMEN POR GRUPO MUSCULAR ──
  // Contar series planificadas por grupo para el mesociclo completo
  const seriesPlan = {};
  const seriesHechas = {};

  plan.forEach(ep => {
    const grupo = ep.GrupoMuscular || 'Otro';
    if (grupo === 'Cardio' || grupo === 'Otro') return;
    const s = parseInt(ep.SeriesObjetivo) || 0;
    seriesPlan[grupo] = (seriesPlan[grupo] || 0) + s;
    seriesHechas[grupo] = seriesHechas[grupo] || 0;
  });

  // Contar series completadas por grupo
  registros.forEach(r => {
    const ep = state.ejercicios.find(e => e.ID_EjercicioPlan === r.ID_EjercicioPlan);
    if (!ep) return;
    const grupo = ep.GrupoMuscular || 'Otro';
    if (grupo === 'Cardio' || grupo === 'Otro') return;
    seriesHechas[grupo] = (seriesHechas[grupo] || 0) + 1;
  });

  // Ritmo esperado según semana
  const pctSemana = semanaActual / 4;

  const gruposOrdenados = Object.keys(seriesPlan).sort((a,b) => (seriesPlan[b]||0) - (seriesPlan[a]||0));

  const volItems = gruposOrdenados.map(grupo => {
    const planTotal = seriesPlan[grupo] || 0;
    const hechas = seriesHechas[grupo] || 0;
    const pctHecho = planTotal > 0 ? (hechas / planTotal) : 0;
    const esperadas = Math.round(planTotal * pctSemana);
    const color = GRUPOS_COLORES[grupo] || '#98989d';
    const rango = RANGOS_SEMANALES[grupo] || [6, 16];
    const seriesSemana = hechas / semanaActual;

    let ritmoTxt = '', ritmoClass = '';
    if (hechas === 0) { ritmoTxt = '— Sin series registradas'; ritmoClass = 'bajo'; }
    else if (hechas >= esperadas * 0.9) { ritmoTxt = `✓ Buen ritmo · ${hechas}/${planTotal} series`; ritmoClass = 'ok'; }
    else { ritmoTxt = `⚠ Ritmo bajo · esperadas ${esperadas}`; ritmoClass = 'bajo'; }

    return `<div class="vol-item">
      <div class="vol-item-header">
        <div class="vol-item-nombre">
          <div class="vol-item-dot" style="background:${color}"></div>
          ${grupo}
        </div>
        <div class="vol-item-nums">${hechas}/${planTotal} · ~${rango[0]}-${rango[1]}/sem</div>
      </div>
      <div class="vol-bar-bg">
        <div class="vol-bar-fill" style="width:${Math.min(pctHecho*100,100)}%;background:${color}"></div>
        <div class="vol-bar-target" style="left:${pctSemana*100}%"></div>
      </div>
      <div class="vol-ritmo ${ritmoClass}">${ritmoTxt}</div>
    </div>`;
  }).join('');

  html += `<div class="progreso-bloque">
    <div class="progreso-bloque-header">
      <div>
        <div class="progreso-bloque-titulo">💪 Volumen por grupo muscular</div>
        <div class="progreso-bloque-sub">Series completadas vs planificadas en ${meso} · línea = ritmo S${semanaActual}</div>
      </div>
    </div>
    ${gruposOrdenados.length > 0 ? volItems : '<div class="empty-progreso">Las series completadas aparecerán aquí conforme registres sesiones.</div>'}
  </div>`;

  // ── BLOQUE 3: PROGRESIÓN DE CARGAS ──
  // Comparar PesoActual de M5 vs M4 por ejercicio
  const ejerciciosM5S1 = state.ejercicios.filter(e => (e.ID_EjercicioPlan||'').startsWith('M5-S1-'));
  const progItems = ejerciciosM5S1
    .filter(e => {
      const peso = parseFloat(e.PesoActual || e['Peso Actual'] || 0);
      return peso > 0 && e.GrupoMuscular !== 'Cardio';
    })
    .map(e => {
      const nombre = e.NombreEjercicio || '';
      const pesoM5 = parseFloat(e.PesoActual || e['Peso Actual'] || 0);

      // Buscar mismo ejercicio en M4
      const ejM4 = state.ejercicios.find(prev => {
        const id = prev.ID_EjercicioPlan || '';
        return id.startsWith('M4-S1-') && mismoEj(prev.NombreEjercicio, nombre);
      });
      const pesoM4 = ejM4 ? parseFloat(ejM4.PesoActual || ejM4['Peso Actual'] || 0) : 0;

      // También buscar el peso real registrado en M5 si hay
      const registroM5 = state.registroSeries.filter(r => {
        const ep = state.ejercicios.find(ep2 => ep2.ID_EjercicioPlan === r.ID_EjercicioPlan);
        return ep && (ep.ID_EjercicioPlan||'').startsWith('M5') &&
               mismoEj(ep.NombreEjercicio, nombre) && parseFloat(r.Peso) > 0;
      });
      const pesoReal = registroM5.length > 0 ?
        Math.max(...registroM5.map(r => parseFloat(r.Peso)||0)) : pesoM5;

      const delta = pesoM4 > 0 ? pesoReal - pesoM4 : 0;
      const badgeClass = delta > 0 ? 'sube' : delta < 0 ? 'baja' : 'igual';
      const badgeTxt = delta > 0 ? `+${delta}kg ↑` : delta < 0 ? `${delta}kg ↓` : pesoM4 > 0 ? '= igual' : `${pesoReal}kg`;

      return { nombre, pesoM4, pesoReal, delta, badgeClass, badgeTxt, grupo: e.GrupoMuscular };
    })
    .sort((a,b) => b.delta - a.delta);

  const progHtml = progItems.length > 0 ? progItems.map(p => `
    <div class="prog-ejercicio-item">
      <div>
        <div class="prog-ej-nombre">${p.nombre}</div>
        <div class="prog-ej-sub">${p.grupo} · ${p.pesoM4 > 0 ? `M4: ${p.pesoM4}kg → M5: ${p.pesoReal}kg` : `Ref: ${p.pesoReal}kg`}</div>
      </div>
      <div class="prog-ej-badge ${p.badgeClass}">${p.badgeTxt}</div>
    </div>`).join('') :
    '<div class="empty-progreso">La progresión de cargas aparecerá aquí.</div>';

  html += `<div class="progreso-bloque">
    <div class="progreso-bloque-header">
      <div>
        <div class="progreso-bloque-titulo">📈 Progresión de cargas</div>
        <div class="progreso-bloque-sub">M5 vs M4 por ejercicio</div>
      </div>
    </div>
    ${progHtml}
  </div>`;

  document.getElementById('progreso-content').innerHTML = html;
}

function getAllMedidas() {
  return [...MEDIDAS_HISTORICO, ...medidasExtra]
    .sort((a,b) => {
      const pa = a.fecha.split('/').reverse().join('');
      const pb = b.fecha.split('/').reverse().join('');
      return pa.localeCompare(pb);
    });
}

function renderMedidas() {
  const todas = getAllMedidas();
  const primera = todas[0];
  const ultima = todas[todas.length-1];

  // Resumen stats
  const statsHtml = Object.entries(MEDIDAS_CONFIG).map(([key, cfg]) => {
    const ini = primera[key] || 0;
    const act = ultima[key] || 0;
    const delta = act - ini;
    const signo = delta > 0 ? '+' : '';
    const esMejora = (cfg.mejora === 'menos' && delta < 0) || (cfg.mejora === 'mas' && delta > 0);
    const esEmpeora = (cfg.mejora === 'menos' && delta > 0) || (cfg.mejora === 'mas' && delta < 0);
    const deltaClass = esMejora ? 'pos' : (esEmpeora ? 'neg' : 'neu');
    return `<div class="medidas-stat" onclick="cambiarMedida('${key}')">
      <div class="medidas-stat-label">${cfg.icono} ${cfg.label}</div>
      <div class="medidas-stat-valor">${act}${cfg.unidad}</div>
      <div class="medidas-stat-delta ${deltaClass}">${signo}${delta.toFixed(1)}${cfg.unidad} total</div>
    </div>`;
  }).join('');

  document.getElementById('medidas-resumen').innerHTML = `<div class="medidas-stat-grid">${statsHtml}</div>`;

  // Botón inteligente — solo mostrar en última semana del mesociclo
  const semanaActual = parseInt(state.config?.SemanaActual || 0);
  const numSemanas = 4; // duración mesociclo
  const mesocicloActual = state.config?.MesocicloActual || 'M5';
  const esSemanaFinal = semanaActual >= numSemanas;
  const semanasRestantes = numSemanas - semanaActual;

  // Última medición
  const todasMed = getAllMedidas();
  const ultimaMed = todasMed[todasMed.length - 1];
  const haceXDias = ultimaMed ? (() => {
    const partes = ultimaMed.fecha.split('/');
    const fechaMed = new Date(partes[2], partes[1]-1, partes[0]);
    const hoy = new Date();
    return Math.floor((hoy - fechaMed) / (1000*60*60*24));
  })() : 999;

  let btnHtml = '';
  if (esSemanaFinal) {
    btnHtml = `<button class="btn-primary" onclick="mostrarFormMedidas()">📏 Registrar medidas — Fin de ${mesocicloActual}</button>`;
  } else if (haceXDias < 10) {
    btnHtml = `<div style="margin:0 16px;padding:12px 16px;background:rgba(48,209,88,0.08);border:1px solid rgba(48,209,88,0.2);border-radius:12px;font-size:13px;color:var(--green)">✓ Medición reciente registrada (hace ${haceXDias} días)</div>`;
  } else {
    btnHtml = `<div style="margin:0 16px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;font-size:13px;color:var(--text2)">⏳ Próxima medición al final del mesociclo — quedan <strong style="color:var(--text)">${semanasRestantes} semana${semanasRestantes!==1?'s':''}</strong></div>`;
  }
  document.getElementById('medidas-boton-wrap').innerHTML = btnHtml;

  // Nav de medidas
  const navHtml = Object.entries(MEDIDAS_CONFIG).map(([key, cfg]) =>
    `<button class="medidas-nav-btn ${key===medidaActiva?'active':''}" onclick="cambiarMedida('${key}')">${cfg.label}</button>`
  ).join('');

    <div class="medidas-nav">${navHtml}</div>

      <div class="medidas-grafico-titulo" id="grafico-titulo"></div>

function cambiarMedida(key) {
  medidaActiva = key;

    if (b.textContent === MEDIDAS_CONFIG[key].label) b.classList.add('active');

function renderGrafico(key) {
  const cfg = MEDIDAS_CONFIG[key];
  const todas = getAllMedidas();
  const labels = todas.map(m => m.fecha.substring(0,5));
  const valores = todas.map(m => m[key] || null);

  document.getElementById('grafico-titulo').textContent = `${cfg.icono} ${cfg.label} (${cfg.unidad})`;

  const canvas = document.getElementById('grafico-medida');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  if (graficoChart) { graficoChart.destroy(); graficoChart = null; }

  // Colores según mejora/empeora
  const primera = valores.find(v => v !== null);
  const ultima = [...valores].reverse().find(v => v !== null);
  const delta = ultima - primera;
  const esMejora = (cfg.mejora === 'menos' && delta < 0) || (cfg.mejora === 'mas' && delta > 0);
  const lineColor = esMejora ? '#30d158' : '#f5a623';

  canvas.style.height = '200px';
  canvas.style.maxHeight = '200px';
  graficoChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: valores,
        borderColor: lineColor,
        backgroundColor: lineColor + '22',
        borderWidth: 2.5,
        pointBackgroundColor: lineColor,
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.3,
        spanGaps: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#1a1a1a',
        titleColor: '#999', bodyColor: '#f0f0f0',
        callbacks: { label: ctx => `${ctx.parsed.y}${cfg.unidad}` }
      }},
      scales: {
        x: { ticks: { color: '#666', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e1e1e' } },
        y: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#1e1e1e' } }
      }
    }
  });
}

function renderHistorial() {
  const todas = getAllMedidas().reverse();
  const html = todas.map((m, i) => {
    const prev = todas[i+1];
    const deltaPeso = prev ? (m.peso - prev.peso).toFixed(1) : null;
    const deltaStr = deltaPeso ? (deltaPeso > 0 ? `+${deltaPeso}` : deltaPeso) + 'kg' : '';
    const deltaColor = deltaPeso < 0 ? 'var(--green)' : deltaPeso > 0 ? 'var(--red)' : 'var(--text2)';
    return `<div class="medidas-historial-item">
      <div>
        <div style="font-size:14px;font-weight:600">${m.fecha}</div>
        <div class="medidas-historial-fecha">${m.peso}kg · C:${m.cintura} · B:${m.biceps}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:14px;font-weight:700">${m.peso}kg</div>
        ${deltaStr ? `<div style="font-size:12px;color:${deltaColor}">${deltaStr}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('medidas-historial').innerHTML =
    `<div style="padding:0 16px 8px;font-size:11px;font-weight:600;letter-spacing:0.8px;color:var(--text3);text-transform:uppercase">Historial</div>${html}`;
}

function mostrarFormMedidas() {
  const hoy = new Date().toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'/');
  const ultima = getAllMedidas().slice(-1)[0];
  document.getElementById('form-medidas').style.display = 'block';
  document.getElementById('form-medidas').innerHTML = `
    <div style="font-size:16px;font-weight:700;margin-bottom:16px">Nueva medición</div>
    <div class="medidas-form-grid">
      ${Object.entries(MEDIDAS_CONFIG).map(([key,cfg]) => `
        <div class="medidas-form-item">
          <label>${cfg.icono} ${cfg.label} (${cfg.unidad})</label>
          <input type="number" step="0.1" inputmode="decimal" id="input-${key}" placeholder="${ultima[key]||''}">
        </div>`).join('')}
    </div>
    <button class="btn-primary" onclick="guardarMedidas()">Guardar medición</button>
    <button class="btn-secondary" onclick="document.getElementById('form-medidas').style.display='none'">Cancelar</button>
  `;
  document.getElementById('form-medidas').scrollIntoView({behavior:'smooth'});
}

async function guardarMedidas() {
  const hoy = new Date().toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit',year:'numeric'});
  const nueva = { fecha: hoy };
  const ultima = getAllMedidas().slice(-1)[0];

  let validos = 0;
  for (const key of Object.keys(MEDIDAS_CONFIG)) {
    const input = document.getElementById('input-' + key);
    const val = parseFloat(input?.value);
    nueva[key] = isNaN(val) ? (ultima[key] || 0) : val;
    if (!isNaN(val)) validos++;
  }

  if (validos === 0) { showToast('Introduce al menos una medida', 'error'); return; }

  medidasExtra.push(nueva);

  // Enviar a Google Sheet
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ type: 'medidas', row: nueva }),
    });
    showToast('Medición guardada ✓', 'success');
  } catch(e) {
    showToast('Guardado localmente (sin conexión)', '');
  }

  document.getElementById('form-medidas').style.display = 'none';
  renderMedidas();
}

</script>
</body>
</html>
